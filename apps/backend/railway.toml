[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_24"]

[build.nixpacksPlan.phases.install]
cmds = ["npm install"]

[build.nixpacksPlan.phases.build]
cmds = ["npm run build --workspace=@about-time/backend"]

[build.nixpacksPlan.start]
cmd = "npm run start --workspace=@about-time/backend"
