[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20"]

[build.nixpacksPlan.phases.install]
cmds = ["npm install"]

[build.nixpacksPlan.phases.build]
cmds = [
  "npm run build --workspace=@tannerbroberts/about-time-core",
  "npm run build --workspace=@about-time/api-client",
  "npm run build --workspace=@about-time/frontend"
]

[build.nixpacksPlan.start]
cmd = "npx serve -s apps/frontend/dist -l $PORT"
