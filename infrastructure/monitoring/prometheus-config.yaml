apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: about-time
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'about-time-prod'
        environment: 'production'

    scrape_configs:
      # Scrape backend API metrics
      - job_name: 'about-time-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - about-time
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__address__]
            regex: '([^:]+):.*'
            replacement: '${1}:3001'
            target_label: __address__
          - source_labels: []
            replacement: '/metrics'
            target_label: __metrics_path__

      # Scrape PostgreSQL metrics (if exporter is installed)
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      # Scrape Redis metrics (if exporter is installed)
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: about-time
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}  # For production, use PersistentVolumeClaim

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: about-time
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: web
  selector:
    app: prometheus
