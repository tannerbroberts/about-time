services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: about-time-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: about_time
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - about-time-network

  # Redis cache and session store
  redis:
    image: redis:7-alpine
    container_name: about-time-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - about-time-network

  # Backend API server (optional - uncomment to run in Docker)
  # backend:
  #   build:
  #     context: .
  #     dockerfile: infrastructure/docker/Dockerfile.backend
  #   container_name: about-time-backend
  #   environment:
  #     NODE_ENV: development
  #     PORT: 3001
  #     DATABASE_URL: postgres://postgres:postgres@postgres:5432/about_time
  #     REDIS_URL: redis://redis:6379
  #     SESSION_SECRET: dev-session-secret-change-in-production
  #     CORS_ORIGIN: http://localhost:5173
  #   ports:
  #     - '3001:3001'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - about-time-network

  # Frontend web app (optional - uncomment to run in Docker)
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: infrastructure/docker/Dockerfile.frontend
  #     args:
  #       VITE_API_URL: http://localhost:3001/api
  #   container_name: about-time-frontend
  #   ports:
  #     - '8080:8080'
  #   depends_on:
  #     - backend
  #   networks:
  #     - about-time-network

volumes:
  postgres_data:
  redis_data:

networks:
  about-time-network:
    driver: bridge
